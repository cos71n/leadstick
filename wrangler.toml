name = "leadstick-api"
main = "worker/index.js"
compatibility_date = "2024-07-01"

# Environment variables (non-sensitive only)
[vars]
ENVIRONMENT = "development"
LEAD_EMAIL_RECIPIENT = "michael.costin@localdigital.com.au"
LEAD_EMAIL_FROM = "Postclick Lead <noreply@post.click>"
ADMIN_ALLOWED_ORIGINS = "https://leadstick-dashboard.pages.dev,http://localhost:3000,http://127.0.0.1:3000"

# KV Namespaces
[[kv_namespaces]]
binding = "LEADSTICK_CONFIGS"
id = "9ed0226c090542429677c61665c4ebc2"

# R2 Buckets
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "leadstick-widget"

# Analytics Engine
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "leadstick_events"

# Cron Triggers - Monthly analytics snapshots to KV
# Runs at 2am UTC on the 1st and 15th of each month
[triggers]
crons = ["0 2 1 * *", "0 2 15 * *"]

# Secrets are managed via CLI:
# wrangler secret put RESEND_API_KEY
# wrangler secret put GA4_MEASUREMENT_ID
# wrangler secret put GA4_API_SECRET
# wrangler secret put CF_API_TOKEN
# wrangler secret put CF_ACCOUNT_ID